<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRS INSIGHT — Connecting the Insights of Sydney and Seoul</title>
  <meta name="description" content="TRS INSIGHT — Technology · Research · Strategy. Connecting the Insights of Sydney and Seoul.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Background photo — punchy & vivid */
    .hero__bg {
      position: absolute;
      inset: 0;
      background-image: url('bondi.png');
      background-size: cover;
      background-position: center 40%;
      background-repeat: no-repeat;
      z-index: 0;
      filter: brightness(1.12) saturate(1.3) contrast(1.05);
    }

    /* Very light overlay — keep photo bright */
    .hero__overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.08);
      z-index: 1;
    }

    /* Centre content */
    .hero__content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      animation: fadeUp 1.4s ease both;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(2.8rem, 7vw, 6.2rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
      text-shadow:
        0 0 24px rgba(0,0,0,0.65),
        0 2px 12px rgba(0,0,0,0.5),
        0 1px 6px rgba(0,0,0,0.35);
    }

    .sub {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(0.78rem, 1.8vw, 1.08rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #ffffff;
      margin-top: 0.9em;
      text-shadow:
        0 0 20px rgba(0,0,0,0.9),
        0 2px 12px rgba(0,0,0,0.8),
        0 1px 4px rgba(0,0,0,0.6);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.5);
      margin: 1.8em auto;
    }

    .slogan {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: clamp(0.82rem, 1.6vw, 1.02rem);
      letter-spacing: 0.07em;
      color: #ffffff;
      line-height: 1.7;
      text-shadow:
        0 0 20px rgba(0,0,0,0.9),
        0 2px 12px rgba(0,0,0,0.8),
        0 1px 4px rgba(0,0,0,0.6);
    }

    /* ─── BOTTOM BAR — single row ─── */
    .footer-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.18);
      padding: 11px 32px;
      text-align: center;
      animation: fadeIn 2s ease both;
    }

    .footer-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .footer-location,
    .footer-email,
    .footer-copy {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: clamp(0.65rem, 1.2vw, 0.78rem);
      color: rgba(255, 255, 255, 0.88);
      text-decoration: none;
    }

    .footer-location {
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .footer-email {
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    .footer-email:hover { color: #fff; }

    .footer-copy {
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .footer-sep {
      color: rgba(255, 255, 255, 0.35);
      font-weight: 300;
      font-size: 0.75rem;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── MOBILE ─── */
    @media (max-width: 600px) {
      body { overflow: auto; }

      .hero {
        height: 100svh;
        min-height: 560px;
        justify-content: flex-start;
        padding-top: 7vh;
      }

      /* No overlay — sky is bright enough for dark text */
      .hero__overlay {
        background: rgba(0, 0, 0, 0.0);
      }

      .hero__bg {
        background-position: 55% 30%;
      }

      /* Dark navy text for sky background */
      .brand {
        font-size: clamp(2.2rem, 11vw, 3rem);
        letter-spacing: 0.12em;
        color: #1b2a4a;
        text-shadow: none;
      }

      .sub {
        font-size: clamp(0.62rem, 3vw, 0.82rem);
        letter-spacing: 0.14em;
        color: #2c3e6b;
        text-shadow: none;
      }

      .divider {
        margin: 0.9em auto;
        background: rgba(27, 42, 74, 0.35);
      }

      .slogan {
        font-size: clamp(0.72rem, 3.2vw, 0.9rem);
        color: #2c3e6b;
        text-shadow: none;
      }

      /* Footer: restore original transparency */
      .footer-bar {
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.10);
        border-top: 1px solid rgba(255, 255, 255, 0.18);
      }

      .footer-location,
      .footer-email,
      .footer-copy {
        color: rgba(255, 255, 255, 0.88);
        font-size: 0.62rem;
      }

      .footer-sep {
        display: none;
      }

      .footer-copy {
        width: 100%;
        text-align: center;
        margin-top: 2px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__overlay"></div>

    <div class="hero__content">
      <h1 class="brand">TRS INSIGHT</h1>
      <p class="sub">Technology&nbsp;·&nbsp;Research&nbsp;·&nbsp;Strategy</p>
      <div class="divider"></div>
      <p class="slogan">
        Connecting the Insights<br>of Sydney and Seoul
      </p>
    </div>

    <footer class="footer-bar">
      <div class="footer-row">
        <span class="footer-location">Sydney&nbsp;·&nbsp;Seoul</span>
        <span class="footer-sep">|</span>
        <a class="footer-email" href="mailto:insight@trsinsight.com">insight@trsinsight.com</a>
        <span class="footer-sep">|</span>
        <span class="footer-copy">© 2026 TRS INSIGHT</span>
      </div>
    </footer>

  </section>

</body>
</html>
